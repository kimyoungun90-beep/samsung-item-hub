<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Item HUB" />
  <title>코스트코 아이템 조회 HUB</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #111827;
      --danger: #ef4444;
      --success: #16a34a;
      --warning: #f59e0b;
      --radius: 20px;
      --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 14px 28px;
    }

    .hero {
      background: linear-gradient(135deg, #111827 0%, #1f2937 55%, #374151 100%);
      color: #fff;
      border-radius: 26px;
      padding: 24px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.86);
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.18;
      letter-spacing: -0.7px;
    }

    .hero p {
      margin: 10px 0 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      line-height: 1.5;
    }

    .search-card, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .search-card { padding: 16px; margin-bottom: 14px; }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .mode-tab {
      min-height: 46px;
      border: 1px solid var(--line);
      background: #f9fafb;
      color: #374151;
      box-shadow: none;
      font-size: 14px;
    }

    .mode-tab.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 800;
      color: #374151;
    }

    .search-row { display: flex; gap: 8px; }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 15px 14px;
      font-size: 16px;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.08);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 0 18px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      min-height: 52px;
    }

    button:active { transform: scale(0.98); }

    .sub-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .ghost-btn {
      background: #f9fafb;
      color: #111827;
      border: 1px solid var(--line);
      min-height: 46px;
      font-size: 14px;
    }

    .hint {
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .status {
      display: none;
      margin: 12px 0;
      padding: 13px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      border: 1px solid var(--line);
      background: #fff;
    }

    .status.show { display: block; }
    .status.error { border-color: rgba(239, 68, 68, 0.25); background: #fef2f2; color: #991b1b; }
    .status.success { border-color: rgba(22, 163, 74, 0.25); background: #f0fdf4; color: #166534; }
    .status.warn { border-color: rgba(245, 158, 11, 0.25); background: #fffbeb; color: #92400e; }

    .result-wrap { display: none; gap: 12px; }
    .result-wrap.show { display: grid; }

    .section-wrap { display: none; gap: 12px; }
    .section-wrap.show { display: grid; }

    .card { padding: 16px; }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card-title h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: -0.3px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.live { background: #dcfce7; color: #166534; }
    .pill.end { background: #f3f4f6; color: #4b5563; }
    .pill.soon { background: #fffbeb; color: #92400e; }

    .kv { display: grid; gap: 10px; }

    .kv-row {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 10px;
      align-items: start;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--line);
    }

    .kv-row:last-child { border-bottom: 0; padding-bottom: 0; }

    .key {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .value {
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
      word-break: keep-all;
    }

    .big-value {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .summary-box {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      color: #374151;
      line-height: 1.55;
      font-size: 14px;
      font-weight: 650;
    }

    .cost-list { display: grid; gap: 8px; }

    .cost-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px;
      background: #fff;
    }

    .cost-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .cost-name { font-weight: 900; font-size: 15px; }

    .money-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .money-box {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
    }

    .money-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .money-value {
      font-size: 16px;
      font-weight: 950;
      letter-spacing: -0.3px;
    }

    .bottom-nav {
      position: sticky;
      bottom: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
      z-index: 10;
    }

    .nav-btn {
      min-height: 48px;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.16);
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 390px) {
      .hero h1 { font-size: 23px; }
      .search-row { flex-direction: column; }
      button { width: 100%; }
      .kv-row { grid-template-columns: 94px 1fr; }
      .money-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-badge">Costco Item Search</div>
      <h1>코스트코<br />아이템 조회 HUB</h1>
      <p>아이템번호 6자리를 입력하면 상품DB와 이전설치비용DB를 분리해서 확인할 수 있습니다.</p>
    </section>

    <section class="search-card">
      <div class="mode-tabs">
        <button id="productModeBtn" class="mode-tab active" type="button">상품DB 조회</button>
        <button id="installModeBtn" class="mode-tab" type="button">이전설치비용DB 조회</button>
      </div>

      <label class="label" for="itemInput">아이템번호</label>
      <div class="search-row">
        <input id="itemInput" inputmode="numeric" maxlength="6" placeholder="예: 689291" autocomplete="off" />
        <button id="searchBtn" type="button">검색</button>
      </div>
      <div class="sub-actions">
        <button class="ghost-btn" id="resetBtn" type="button">초기화</button>
        <button class="ghost-btn" id="sampleBtn" type="button">샘플번호</button>
      </div>
      <p id="modeHint" class="hint">※ 상품DB 조회: 판매가격, 행사 일정, 할인 금액, 배송 가능 일자를 확인합니다.</p>
    </section>

    <div id="status" class="status"></div>

    <section id="resultWrap" class="result-wrap">
      <div id="productSection" class="section-wrap show">
        <article class="card">
          <div class="card-title">
            <h2>상품DB</h2>
            <span id="categoryPill" class="pill">품목</span>
          </div>
          <div class="kv">
            <div class="kv-row">
              <div class="key">아이템번호</div>
              <div id="rItemNo" class="value big-value">-</div>
            </div>
            <div class="kv-row">
              <div class="key">모델명</div>
              <div id="rModel" class="value">-</div>
            </div>
            <div class="kv-row">
              <div class="key">품목</div>
              <div id="rCategory" class="value">-</div>
            </div>
            <div class="kv-row">
              <div class="key">상품명</div>
              <div id="rProduct" class="value">-</div>
            </div>
            <div class="kv-row">
              <div class="key">브랜드</div>
              <div id="rBrand" class="value">-</div>
            </div>
            <div class="kv-row">
              <div class="key">판매가격</div>
              <div id="rPrice" class="value big-value">-</div>
            </div>
            <div class="kv-row">
              <div class="key">행사 일정</div>
              <div id="rPromoDate" class="value">-</div>
            </div>
            <div class="kv-row">
              <div class="key">할인 금액</div>
              <div id="rDiscount" class="value big-value">-</div>
            </div>
            <div class="kv-row">
              <div class="key">배송 가능</div>
              <div id="rDelivery" class="value">-</div>
            </div>
          </div>
        </article>
      </div>

      <div id="installSection" class="section-wrap">
        <article class="card">
          <div class="card-title">
            <h2>이전설치비용DB</h2>
            <span id="costPill" class="pill">비용</span>
          </div>
          <div id="costList" class="cost-list"></div>
        </article>
      </div>
    </section>

    <div class="bottom-nav">
      <button class="nav-btn" id="copyBtn" type="button">결과 복사</button>
      <button class="nav-btn" id="shareBtn" type="button">공유</button>
    </div>

    <footer class="footer">
      Costco Item Search HUB · GitHub Pages Version<br />
      Google Sheets DB 연결형
    </footer>
  </main>

  <script>
    /*****************************************************************
     * Apps Script 배포 URL을 여기에 넣으세요.
     * 예: https://script.google.com/macros/s/AKfycbxxxx/exec
     *****************************************************************/
    const CONFIG = {
      APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwtnE_Bwm4YwwBHdg-38aelzvlnR0ryZKo9zwLwVjkiehVFdaboxDBFdS8NsAg3ZeGhZQ/exec"
    };

    const SAMPLE_ITEMS = [
      {
        itemNo: "689291",
        modelName: "KU43UF8570FXKR",
        category: "TV",
        productName: "43인치 UHD",
        brand: "SAMSUNG",
        price: "599000",
        promoStart: "2026-04-16",
        promoEnd: "2026-05-10",
        discountAmount: "90000",
        deliveryAvailableDate: "핸드캐리"
      }
    ];

    const SAMPLE_COSTS = [
      {
        itemNo: "689291",
        modelName: "KU43UF8570FXKR",
        category: "TV",
        productName: "43인치 UHD",
        installCost: "스탠드: 99000\n벽걸이: 161000",
        removalCost: "스탠드: 38000\n벽걸이: 60000",
        note: "벽걸이 자재 삼성전자 정품인 경우만 철거 가능"
      }
    ];

    let currentResult = null;
    let currentMode = "product";

    const $ = (id) => document.getElementById(id);
    const itemInput = $("itemInput");
    const searchBtn = $("searchBtn");
    const resetBtn = $("resetBtn");
    const sampleBtn = $("sampleBtn");
    const statusBox = $("status");
    const resultWrap = $("resultWrap");
    const productModeBtn = $("productModeBtn");
    const installModeBtn = $("installModeBtn");

    searchBtn.addEventListener("click", handleSearch);
    resetBtn.addEventListener("click", resetView);
    sampleBtn.addEventListener("click", () => {
      itemInput.value = "689291";
      handleSearch();
    });
    $("copyBtn").addEventListener("click", copyResult);
    $("shareBtn").addEventListener("click", shareResult);

    productModeBtn.addEventListener("click", () => setMode("product"));
    installModeBtn.addEventListener("click", () => setMode("install"));

    itemInput.addEventListener("input", () => {
      itemInput.value = itemInput.value.replace(/[^0-9]/g, "").slice(0, 6);
    });

    itemInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") handleSearch();
    });

    function setMode(mode) {
      currentMode = mode;
      productModeBtn.classList.toggle("active", mode === "product");
      installModeBtn.classList.toggle("active", mode === "install");
      $("productSection").classList.toggle("show", mode === "product");
      $("installSection").classList.toggle("show", mode === "install");
      $("modeHint").textContent = mode === "product"
        ? "※ 상품DB 조회: 판매가격, 행사 일정, 할인 금액, 배송 가능 일자를 확인합니다."
        : "※ 이전설치비용DB 조회: 이전설치비용, 철거비용, 비고를 확인합니다.";

      if (currentResult) {
        resultWrap.classList.add("show");
      }
    }

    function showStatus(message, type = "warn") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    function hideStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function resetView() {
      itemInput.value = "";
      currentResult = null;
      resultWrap.classList.remove("show");
      hideStatus();
      itemInput.focus();
    }

    async function handleSearch() {
      const itemNo = itemInput.value.trim();
      hideStatus();

      if (!/^\d{6}$/.test(itemNo)) {
        showStatus("아이템번호 6자리 숫자를 입력해 주세요.", "error");
        resultWrap.classList.remove("show");
        return;
      }

      try {
        showStatus("아이템 정보를 조회 중입니다.", "warn");
        const data = await findItem(itemNo);

        if (!data || (!data.item && !(data.costs || []).length)) {
          showStatus("조회된 정보가 없습니다. 아이템번호를 다시 확인해 주세요.", "error");
          resultWrap.classList.remove("show");
          return;
        }

        currentResult = data;
        renderResult(data.item, data.costs || [], itemNo);
        showStatus(currentMode === "product" ? "상품DB 정보가 조회되었습니다." : "이전설치비용DB 정보가 조회되었습니다.", "success");
      } catch (error) {
        console.error(error);
        showStatus("조회 중 오류가 발생했습니다. Apps Script 배포 URL 또는 권한을 확인해 주세요.", "error");
      }
    }

    async function findItem(itemNo) {
      if (CONFIG.APPS_SCRIPT_URL) {
        const url = `${CONFIG.APPS_SCRIPT_URL}?action=search&itemNo=${encodeURIComponent(itemNo)}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error("API response error");
        return await response.json();
      }

      const item = SAMPLE_ITEMS.find((row) => String(row.itemNo) === itemNo);
      const costs = SAMPLE_COSTS.filter((row) => String(row.itemNo) === itemNo);
      return { ok: true, item: item || null, costs };
    }

    function renderResult(item, costs, searchedItemNo) {
      renderProduct(item, searchedItemNo);
      renderCosts(costs, item, searchedItemNo);
      resultWrap.classList.add("show");
      setMode(currentMode);
    }

    function renderProduct(item, searchedItemNo) {
      if (!item) {
        $("rItemNo").textContent = searchedItemNo || "-";
        $("rModel").textContent = "상품DB 미등록";
        $("rCategory").textContent = "-";
        $("rProduct").textContent = "-";
        $("rBrand").textContent = "-";
        $("rPrice").textContent = "-";
        $("rPromoDate").textContent = "-";
        $("rDiscount").textContent = "-";
        $("rDelivery").textContent = "-";
        $("categoryPill").textContent = "미등록";
        return;
      }

      $("rItemNo").textContent = item.itemNo || "-";
      $("rModel").textContent = item.modelName || "-";
      $("rCategory").textContent = item.category || "-";
      $("rProduct").textContent = item.productName || "-";
      $("rBrand").textContent = item.brand || "-";
      $("rPrice").textContent = formatMoney(item.price);
      $("rPromoDate").textContent = formatPromoDate(item.promoStart, item.promoEnd);
      $("rDiscount").textContent = formatMoney(item.discountAmount);
      $("rDelivery").textContent = formatDateText(item.deliveryAvailableDate);
      $("categoryPill").textContent = item.category || "품목";
    }

    function renderCosts(costs, item, searchedItemNo) {
      const box = $("costList");
      box.innerHTML = "";

      if (!costs.length) {
        $("costPill").textContent = "미등록";
        box.innerHTML = `<div class="summary-box">${escapeHtml(searchedItemNo)} 아이템번호로 등록된 이전설치/철거 비용이 없습니다.</div>`;
        return;
      }

      $("costPill").textContent = `${costs.length}건`;

      costs.forEach((cost) => {
        const div = document.createElement("div");
        div.className = "cost-item";
        div.innerHTML = `
          <div class="cost-top">
            <div>
              <div class="cost-name">${escapeHtml(cost.productName || item?.productName || cost.modelName || "이전설치 비용")}</div>
              <div class="value" style="font-size:13px;color:#6b7280;">${escapeHtml(cost.modelName || item?.modelName || "-")}</div>
            </div>
            <span class="pill">${escapeHtml(cost.category || item?.category || "-")}</span>
          </div>
          <div class="money-grid">
            <div class="money-box">
              <div class="money-label">이전설치비용</div>
              <div class="money-value">${formatMultilineCost(cost.installCost)}</div>
            </div>
            <div class="money-box">
              <div class="money-label">철거비용</div>
              <div class="money-value">${formatMultilineCost(cost.removalCost)}</div>
            </div>
          </div>
          ${cost.note ? `<div class="summary-box" style="margin-top:8px;">${escapeHtml(cost.note)}</div>` : ""}
        `;
        box.appendChild(div);
      });
    }

    function formatPromoDate(start, end) {
      if (!start && !end) return "-";
      return `${formatDateText(start)} ~ ${formatDateText(end)}`;
    }

    function formatDateText(value) {
      if (!value) return "-";
      if (!/^\d{4}-\d{2}-\d{2}$/.test(String(value))) return String(value);
      const [y, m, d] = value.split("-");
      return `${y}.${m}.${d}`;
    }

    function formatMoney(value) {
      if (value === undefined || value === null || value === "") return "-";
      const text = String(value).trim();
      if (text.includes("원")) return text;
      const number = Number(text.replace(/[^0-9.-]/g, ""));
      if (Number.isNaN(number)) return text;
      return `${number.toLocaleString("ko-KR")}원`;
    }

    function formatMultilineCost(value) {
      if (value === undefined || value === null || value === "") return "-";
      const text = String(value);
      if (text.includes(":")) {
        return escapeHtml(text).replace(/\n/g, "<br>");
      }
      return escapeHtml(formatMoney(text)).replace(/\n/g, "<br>");
    }

    async function copyResult() {
      if (!currentResult) {
        showStatus("복사할 조회 결과가 없습니다.", "error");
        return;
      }
      const text = resultToText(currentResult.item, currentResult.costs || []);
      try {
        await navigator.clipboard.writeText(text);
        showStatus("조회 결과가 복사되었습니다.", "success");
      } catch {
        showStatus("복사 기능을 사용할 수 없습니다. 브라우저 권한을 확인해 주세요.", "error");
      }
    }

    async function shareResult() {
      if (!currentResult) {
        showStatus("공유할 조회 결과가 없습니다.", "error");
        return;
      }
      const text = resultToText(currentResult.item, currentResult.costs || []);
      if (navigator.share) {
        try {
          await navigator.share({ title: "코스트코 아이템 조회", text });
          showStatus("공유가 완료되었습니다.", "success");
        } catch {
          showStatus("공유가 취소되었습니다.", "warn");
        }
      } else {
        try {
          await navigator.clipboard.writeText(text);
          showStatus("공유 기능이 없어 결과를 복사했습니다.", "success");
        } catch {
          showStatus("현재 브라우저에서는 공유 기능을 사용할 수 없습니다.", "error");
        }
      }
    }

    function resultToText(item, costs) {
      const productText = item ?
        `[상품DB]\n` +
        `아이템번호: ${item.itemNo}\n` +
        `모델명: ${item.modelName}\n` +
        `품목: ${item.category}\n` +
        `상품명: ${item.productName}\n` +
        `브랜드: ${item.brand}\n` +
        `판매가격: ${formatMoney(item.price)}\n` +
        `행사 일정: ${formatPromoDate(item.promoStart, item.promoEnd)}\n` +
        `할인 금액: ${formatMoney(item.discountAmount)}\n` +
        `배송 가능 일자: ${formatDateText(item.deliveryAvailableDate)}`
        : `[상품DB]\n등록된 상품 정보 없음`;

      const costText = costs.map((c, idx) => {
        return `${idx + 1}) ${c.productName || c.modelName || "이전설치 비용"}\n- 이전설치비용: ${c.installCost || "-"}\n- 철거비용: ${c.removalCost || "-"}\n- 비고: ${c.note || "-"}`;
      }).join("\n");

      return `${productText}\n\n[이전설치비용DB]\n${costText || "등록된 비용 없음"}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
